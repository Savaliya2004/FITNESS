{% extends 'core/base.html' %}
{% load static %}

{% block title %}Payment Failed | FitX{% endblock %}

{% block content %}
<section style="padding: 150px 5% 100px; text-align: center; min-height: 80vh; background: #090b10;">
    <div style="max-width: 500px; margin: 0 auto; background: rgba(239,68,68,0.05); border: 1px solid rgba(239,68,68,0.2); border-radius: 20px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
        <i class="fas fa-times-circle" style="font-size: 4rem; color: #ef4444; margin-bottom: 20px;"></i>
        <h2 style="font-size: 2rem; color: #fff; margin-bottom: 10px;">Payment Failed</h2>
        <p style="color: #aaa; margin-bottom: 30px;">We couldn't verify your payment. Please try again or contact support if the issue persists.</p>
        
        <div style="display: flex; gap: 15px; justify-content: center;">
            <a href="{% url 'membership' %}" style="padding: 12px 24px; border-radius: 999px; background: rgba(255,255,255,0.1); color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.2);">Try Again</a>
            <a href="{% url 'contact' %}" style="padding: 12px 24px; border-radius: 999px; background: rgba(255,255,255,0.05); color: #ccc; text-decoration: none;">Contact Support</a>
        </div>
    </div>
</section>
{% endblock %}
